<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="damGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="waterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0369a1;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#082f49;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#damGrad)"/>
  <!-- Water -->
  <path d="M 0 200 Q 100 180 200 200 T 400 200 L 400 300 L 0 300 Z" fill="url(#waterGrad)"/>
  <!-- Dam structure -->
  <polygon points="100,100 300,100 350,200 50,200" fill="#64748b" stroke="#94a3b8" stroke-width="2"/>
  <!-- Spillway -->
  <rect x="180" y="140" width="40" height="60" fill="#0ea5e9" opacity="0.7"/>
  <text x="200" y="260" font-size="20" fill="#06b6d4" text-anchor="middle" font-family="system-ui">Barragem</text>
</svg>
