<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="transGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3730a3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#transGrad)"/>
  <!-- Transformer tank -->
  <rect x="120" y="80" width="160" height="120" fill="#475569" stroke="#94a3b8" stroke-width="2" rx="8"/>
  <!-- Cooling fins -->
  <rect x="130" y="100" width="140" height="15" fill="#64748b" opacity="0.6"/>
  <rect x="130" y="125" width="140" height="15" fill="#64748b" opacity="0.6"/>
  <rect x="130" y="150" width="140" height="15" fill="#64748b" opacity="0.6"/>
  <!-- Terminals -->
  <circle cx="160" cy="220" r="8" fill="#f59e0b"/>
  <circle cx="200" cy="220" r="8" fill="#f59e0b"/>
  <circle cx="240" cy="220" r="8" fill="#f59e0b"/>
  <text x="200" y="260" font-size="20" fill="#f59e0b" text-anchor="middle" font-family="system-ui">Transformador T-23</text>
</svg>
